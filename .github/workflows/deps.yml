name: Dependency Update

# Weekly check for outdated dependencies (including major versions). When
# updates exist, `cargo upgrade` bumps Cargo.toml (crossing majors), the
# project is re-tested with `make ci`, and a PR is opened for human review.
on:
  schedule:
    # Weekly, Monday 06:17 UTC (off the :00 to avoid the top-of-hour rush).
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  update:
    name: Detect majors, upgrade & retest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # A PAT (secrets.DEPENDABOT_PAT) makes the opened PR trigger this
          # repo's CI. GITHUB_TOKEN works but its PRs skip workflow runs.
          token: ${{ secrets.DEPENDABOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: System dependencies (for cargo-outdated / cargo-edit)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install cargo-edit and cargo-outdated
        run: |
          cargo install cargo-edit || true
          cargo install cargo-outdated || true

      - name: Snapshot outdated report
        run: |
          if command -v cargo-outdated >/dev/null 2>&1; then
            cargo outdated > deps-outdated.txt 2>/dev/null || true
          fi

      - name: Upgrade dependencies (crosses major versions)
        run: cargo upgrade

      - name: Retest with make ci
        id: retest
        run: |
          if make ci; then
            echo "RET_TEST_STATUS=passed" >> "$GITHUB_ENV"
          else
            echo "RET_TEST_STATUS=FAILED (review for breaking changes)" >> "$GITHUB_ENV"
          fi

      - name: Upload outdated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deps-outdated
          path: deps-outdated.txt
          if-no-files-found: ignore

      - name: Open pull request
        if: always()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DEPENDABOT_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): automated dependency update"
          title: "chore(deps): automated dependency update"
          branch: automated/dependency-update
          delete-branch: true
          labels: dependencies
          body: |
            Automated dependency update via `cargo upgrade` (includes major versions).

            **Retest result:** ${{ env.RET_TEST_STATUS }}

            Review the `Cargo.toml` diff and the uploaded `deps-outdated.txt` artifact
            for breaking changes before merging.
